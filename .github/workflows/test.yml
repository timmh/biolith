name: Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        r-version: ["release"]

    steps:
    - uses: actions/checkout@v4
    - name: Set up R ${{ matrix.r-version }}
      uses: r-lib/actions/setup-r@v2
      with:
        r-version: ${{ matrix.r-version }}
    - name: Install R system dependencies
      run: |
        sudo apt-get update && sudo apt-get install -y cmake libcurl4-openssl-dev libssl-dev libxml2-dev libtirpc-dev
    - name: Install R dependencies
      run: |
        R -e "install.packages('spOccupancy', repos='https://cloud.r-project.org'); stopifnot('spOccupancy' %in% rownames(installed.packages()))"
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Python dependencies
      run: |
        pip install -e .[dev,extras]
    - name: Test with unittest
      run: |
        pytest
